name: 'Release'

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  publish-tauri:
    permissions:
      contents: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-latest'  # Apple Silicon
            target: 'aarch64-apple-darwin'
            sidecar_ext: ''
            args: '--target aarch64-apple-darwin'
          - platform: 'macos-latest'  # Intel
            target: 'x86_64-apple-darwin'
            sidecar_ext: ''
            args: '--target x86_64-apple-darwin'
          - platform: 'ubuntu-22.04'
            target: 'x86_64-unknown-linux-gnu'
            sidecar_ext: ''
            args: ''
          - platform: 'windows-latest'
            target: 'x86_64-pc-windows-msvc'
            sidecar_ext: '.exe'
            args: ''

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Linux build deps
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libgtk-3-dev \
            libayatana-appindicator3-dev

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './frontend/src-tauri -> target'
          key: ${{ matrix.target }}

      - name: Install frontend dependencies
        working-directory: frontend
        run: bun install

      - name: Build cortx sidecars (TUI + MCP) — Unix
        if: matrix.platform != 'windows-latest'
        working-directory: frontend
        run: |
          cargo build --release --target ${{ matrix.target }} -p cortx-tui -p cortx-mcp
          mkdir -p src-tauri/binaries
          cp "target/${{ matrix.target }}/release/cortx${{ matrix.sidecar_ext }}" \
             "src-tauri/binaries/cortx-${{ matrix.target }}${{ matrix.sidecar_ext }}"
          cp "target/${{ matrix.target }}/release/cortx-mcp${{ matrix.sidecar_ext }}" \
             "src-tauri/binaries/cortx-mcp-${{ matrix.target }}${{ matrix.sidecar_ext }}"

      - name: Build cortx sidecars (TUI + MCP) — Windows
        if: matrix.platform == 'windows-latest'
        working-directory: frontend
        shell: pwsh
        run: |
          cargo build --release -p cortx-tui -p cortx-mcp
          New-Item -ItemType Directory -Force -Path src-tauri/binaries | Out-Null
          Copy-Item "target/release/cortx.exe" "src-tauri/binaries/cortx-${{ matrix.target }}.exe"
          Copy-Item "target/release/cortx-mcp.exe" "src-tauri/binaries/cortx-mcp-${{ matrix.target }}.exe"

      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: frontend
          tauriScript: bunx tauri
          tagName: v__VERSION__
          releaseName: 'CortX v__VERSION__'
          releaseBody: 'See the assets to download and install this version.'
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
